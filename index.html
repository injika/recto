<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Recto Verso</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align: center;
}

/* Container to align cards */
.container {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
}

.box {
  background-color: transparent;
  width: 220px;
  height: 300px;
  perspective: 1000px;
  cursor: pointer;
}

.box-inner {
  position: relative;
  width: 100%;
  height: 100%;
  transition: transform 1.4s cubic-bezier(0.25, 0.8, 0.25, 1);
  transform-style: preserve-3d;
}


.box.active .box-inner {
  transform: rotateY(180deg);
}

.box-front,
.box-back {
  position: absolute;
  width: 100%;
  height: 100%;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  border-radius: 10px;
}


.box-front {
  background-color: #cccccc;
  color: #111111;
}


.box-back {
  background-color: #8ebf42;
  color: white;
  transform: rotateY(180deg);
}


button {
  margin-top: 30px;
  padding: 10px 20px;
  font-size: 16px;
  cursor: pointer;
}
</style>
<script src="recto-verso.js" defer></script>
</head>

<body>

<h2>Carte Recto–Verso</h2>
<p>Cliquez sur une carte pour la retourner :</p>

<div class="container">

  <div class="box">
    <div class="box-inner">
      <div class="box-front"><h2>RECTO 1</h2></div>
      <div class="box-back"><h2>VERSO 1</h2></div>
    </div>
  </div>

  <div class="box">
    <div class="box-inner">
      <div class="box-front"><h2>RECTO 2</h2></div>
      <div class="box-back"><h2>VERSO 2</h2></div>
    </div>
  </div>

  <div class="box">
    <div class="box-inner">
      <div class="box-front"><h2>RECTO 3</h2></div>
      <div class="box-back"><h2>VERSO 3</h2></div>
    </div>
  </div>

</div>

<button id="resetBtn">Reset Cards</button>



</body>
</html>
